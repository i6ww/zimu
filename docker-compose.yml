version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - zimu-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - STORAGE_BASE_URL=${STORAGE_BASE_URL:-http://localhost:8081}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --limit-max-bytes 524288000
    networks:
      - zimu-network

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./data/audio:/usr/share/nginx/html/audio:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - zimu-network

networks:
  zimu-network:
    driver: bridge
